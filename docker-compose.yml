services:
  rabbitmq:
    image: rabbitmq:3-management # TIP: Changed 'latest' to '3-management' so you actually get the Web UI dashboard!
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SQL_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "2026:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      
  eventstore:
    image: eventstore/eventstore:lts
    environment:
      - EVENTSTORE_CLUSTER_SIZE=1
      - EVENTSTORE_RUN_PROJECTIONS=All
      - EVENTSTORE_START_STANDARD_PROJECTIONS=true
      - EVENTSTORE_NODE_PORT=2113
      - EVENTSTORE_INSECURE=true
      - EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP=true
    ports:
      - "2113:2113"
    volumes:
      - type: volume
        source: eventstore-volume-data
        target: /var/lib/eventstore
      - type: volume
        source: eventstore-volume-logs
        target: /var/log/eventstore
        
  migration:
    build:
      context: .
      dockerfile: src/Data.MigrationService/Dockerfile
    environment:
      ConnectionStrings__AppointmentManagementDb: "Server=sqlserver,1433;Database=AppointmentManagementDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__PatientManagementDb: "Server=sqlserver,1433;Database=PatientManagementDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"
        
  patientservice:
    build:
      context: .
      dockerfile: src/PatientService/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__PatientManagementDb: "Server=sqlserver,1433;Database=PatientManagementDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
    # 2. Update this to wait for the health check
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
  
  appointmentmanagementapi:
    build:
      context: .
      dockerfile: src/AppointmentManagementApi/Dockerfile
    ports:
      - "7080:8080"
    environment:
      ConnectionStrings__AppointmentManagementDb: "Server=sqlserver,1433;Database=AppointmentManagementDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__EventStoreDb: "esdb://eventstore:2113?tls=false"
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      eventstore:
        condition: service_healthy
  
  medicaltreatmentapi:
    build:
      context: .
      dockerfile: src/MedicalTreatmentApi/Dockerfile
    ports:
      - "7090:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__MedicalTreatmentDb: "Server=sqlserver,1433;Database=MedicalTreatmentDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
    depends_on:
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  integration:
    build:
      context: . 
      dockerfile: src/Data.Integration/Dockerfile
    ports:
      - "5005:8080" 
    environment:
      CsvFilePath: "/app/Data/Imports/fake_customer_data_export.csv"
    volumes:
      - ./src/Data/Imports:/app/Data/Imports:ro
    depends_on:
      rabbitmq:
          condition: service_healthy

volumes:
  sqldata:
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
  eventstore-volume-data:
  eventstore-volume-logs: