services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SQL_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "2026:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  migration:
    build:
      context: .
      dockerfile: src/Data.MigrationService/Dockerfile
    environment:
      ConnectionStrings__OnlineToestemmingDb: "Server=sqlserver,1433;Database=OnlineToestemming;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
      ConnectionStrings__AppointmentManagementDb: "Server=sqlserver,1433;Database=AppointmentManagementDb;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: "no"


volumes:
  sqldata:
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
    driver: local