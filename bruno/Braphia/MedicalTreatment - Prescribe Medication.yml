info:
  name: MedicalTreatment - Prescribe Medication
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:7090/medical-treatments/{{treatmentId}}/prescriptions
  body:
    type: json
    data: |-
      {
        "MedicationName": "Lisinopril",
        "Dosage": "10mg",
        "Instructions": "Take once daily in the morning with water",
        "ValidUntil": "2025-12-31T23:59:59Z"
      }
  auth: inherit

runtime:
  variables:
    - name: treatmentId
      value: c3fb658a-19d3-4635-822b-8c5232df98e9

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
