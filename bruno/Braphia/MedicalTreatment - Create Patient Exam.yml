info:
  name: MedicalTreatment - Create Patient Exam
  type: http
  seq: 8

http:
  method: POST
  url: http://localhost:7090/medical-treatments/exams
  body:
    type: json
    data: |-
      {
        "AppointmentId": "{{currentAppointmentId}}",
        "PatientId": "{{currentPatientId}}",
        "PhysicianId": "12345678-1234-1234-1234-123456789012",
        "TreatmentType": "General Consultation",
        "Results": "Patient shows signs of mild hypertension",
        "Diagnosis": "Hypertension Stage 1",
        "Notes": "Patient advised to reduce salt intake and monitor blood pressure daily. Follow-up appointment scheduled in 2 weeks."
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Parse the response payload
        const data = res.getBody();

        // Access the nested 'id' inside 'newAppointment'
        if (data && data.treatmentId) {
          bru.setEnvVar("treatmentId", data.treatmentId);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
