info:
  name: AppointmentManagement - Create Appointment
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:7080/appointment
  body:
    type: json
    data: |-
      {
        "PatientId" : "{{currentPatientId}}",
        "DateTime" : "2026-09-01T00:00:00Z"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Parse the response payload
        const data = res.getBody();

        // Access the nested 'id' inside 'newAppointment'
        if (data && data.newAppointment && data.newAppointment.id) {
          bru.setEnvVar("currentAppointmentId", data.newAppointment.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
