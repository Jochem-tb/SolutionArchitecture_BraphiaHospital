info:
  name: AppointmentManagement - Appointment Check in
  type: http
  seq: 6

http:
  method: POST
  url: http://localhost:7080/appointment/check-in
  body:
    type: json
    data: |-
      {
          "AppointmentId": "{{currentAppointmentId}}",
          "ArrivalStatus": 2
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
